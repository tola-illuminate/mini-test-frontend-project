<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>content</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav class="bg-white shadow-lg sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <div class="text-2xl font-bold text-blue-600">MyProject</div>
            
            <div class="hidden md:flex items-center space-x-8">
                <a href="home.html" class="text-gray-600 hover:text-blue-600 transition">Home</a>
                <a href="about.html" class="text-gray-600 hover:text-blue-600 transition">About</a>
                <a href="content.html" class="text-gray-600 hover:text-blue-600 transition">Content</a>
                <a href="card.html" class="text-gray-600 hover:text-blue-600 transition">Cards</a>
                <a href="login.html" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">Login</a>
            </div>

            <div class="md:hidden flex items-center">
                <button id="mobile-menu-button" class="outline-none">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-white pb-4 px-4 border-t">
        <a href="home.html" class="block py-2 text-gray-600">Home</a>
        <a href="about.html" class="block py-2 text-gray-600">About</a>
        <a href="content.html" class="block py-2 text-gray-600">Content</a>
        <a href="card.html" class="block py-2 text-gray-600">Cards</a>
        <a href="login.html" class="block py-2 text-blue-600 font-bold">Login</a>
    </div>
</nav>


    <main class="max-w-6xl mx-auto py-8 px-4 flex flex-col md:flex-row gap-8">
    <section class="w-full md:w-2/3 bg-white p-6 rounded shadow">
        <h2 class="text-2xl font-bold mb-4">Mobile-Friendly Article</h2>
        <p class="text-gray-600">On a phone, this text fills the screen. On a laptop, the sidebar appears on the right.</p>
    </section>

    <aside class="w-full md:w-1/3 space-y-4">
        <div class="bg-blue-50 p-6 rounded">
            <h3 class="font-bold">Sidebar Widget</h3>
            <p class="text-sm">I stack underneath the article when you view this on a mobile device.</p>
        </div>
    </aside>
</main>

<script>
    const btn = document.getElementById('mobile-menu-button');
    const menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
    });
</script>
</body>
</html>
