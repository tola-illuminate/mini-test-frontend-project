<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MyProject</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="text-2xl font-bold text-blue-600">MyProject</div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="home.html" class="text-gray-600 hover:text-blue-600 transition">Home</a>
                    <a href="about.html" class="text-gray-600 hover:text-blue-600 transition">About</a>
                    <a href="content.html" class="text-gray-600 hover:text-blue-600 transition">Content</a>
                    <a href="card.html" class="text-gray-600 hover:text-blue-600 transition">Cards</a>
                    <a href="login.html" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">Login</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="outline-none">
                        <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white pb-4 px-4 border-t">
            <a href="home.html" class="block py-2 text-gray-600">Home</a>
            <a href="about.html" class="block py-2 text-gray-600">About</a>
            <a href="content.html" class="block py-2 text-gray-600">Content</a>
            <a href="card.html" class="block py-2 text-gray-600">Cards</a>
            <a href="login.html" class="block py-2 text-blue-600 font-bold">Login</a>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
                <p class="text-gray-500 mt-2">Please enter your details to login</p>
            </div>

            <form action="#">
                <div class="mb-5">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Email Address</label>
                    <input type="email" placeholder="example@mail.com" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                
                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center text-sm text-gray-600">
                        <input type="checkbox" class="mr-2 rounded text-blue-600"> Remember me
                    </label>
                    <a href="#" class="text-sm text-blue-600 hover:underline">Forgot Password?</a>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transform hover:scale-[1.02] transition active:scale-95">
                    Sign In
                </button>
            </form>

            <p class="text-center text-gray-600 mt-8 text-sm">
                Don't have an account? <a href="#" class="text-blue-600 font-bold hover:underline">Sign up</a>
            </p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('mobile-menu-button');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => { menu.classList.toggle('hidden'); });
    </script>
</body>
</html>
